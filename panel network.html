    <!DOCTYPE html> 

    <html>

    <head>

    <base href="">

    <title>Network Security Simulator</title>

    <meta charset="UTF-8" />
    <meta charset="UTF-16" />
    <meta charset="UTF-16BE" />
    <meta charset="UTF-16LE" />
    <meta charset="UTF-32" />
    <meta charset="UTF-32BE" />
    <meta charset="UTF-32LE" /> 
    <meta name="viewport" id="viewport" content="width=device-width, initial-scale=1"> 
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://releases.jquery.com/git/mobile/git/jquery.mobile-git.css" />
    <link rel="stylesheet" href="https://code.jquery.com/qunit/qunit-2.24.3.css" />
   
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6/dist/jquery.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3/dist/jquery.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/src/core.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/gh/jquery/jquery@3.6.4/dist/jquery.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/gh/jquery/jquery@3.6/dist/jquery.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/gh/jquery/jquery@3/dist/jquery.min.js"> </script>
    <script src="https://cdn.jsdelivr.net/gh/jquery/jquery@3.6.4/src/core.min.js"> </script> 
    <script src="https://releases.jquery.com/git/mobile/git/jquery.mobile-git.j"s> </script>
    <script src="https://code.jquery.com/qunit/qunit-2.24.3.js"> </script>

<style>
  body {
    font-family: 'Courier New', monospace;
    background-color: #fff;
    color: #0f0;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 600px;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
  }
  h1 {
    text-align: center;
    color: #000000;
    text-shadow: 0 0 5px #0f0;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .control {
    background-color: #d7e2ea;
    padding: 10px;
    border-radius: 5px;
  }
  .control-label {
    font-size: 0.9em;
    color: #888;
    margin-bottom: 5px;
  }
  select, input {
    width: 100%;
    background-color: #00ffff;
    color: #000000;
    border: 1px solid #0f0;
    padding: 5px;
  }
  #log {
    background-color: #ffffff;
    border: 1px solid #000000;
    padding: 10px;
    height: 200px;
    overflow-y: scroll;
    margin-bottom: 20px;
    font-size: 0.9em;
  }
  button {
    background-color: #00a5e3;
    color: #0f0;
    border: none;
    padding: 10px 20px;
    width: 100%;
    cursor: pointer;
    font-size: 1em;
    transition: background-color 0.3s;
    margin-bottom: 10px;
  }
  button:hover {
    background-color: #ffefff;
  }
  #stopButton {
    background-color: #ffdbcc;
    color: #f00;
  }
  #stopButton:hover {
    background-color: #ffefff;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Network Security BTF</h1>
  <div class="controls">
    <div class="control">
      <div class="control-label">Attack Type</div>
      <select id="attackType">
        <option value="ddos">DDoS Attack</option>
        <option value="dos">DoS Attack</option>
        <option value="portScan">Port Scan</option>
        <option value="sqlInjection">SQL Injection</option>
      </select>
    </div>
    <div class="control">
      <div class="control-label">Target IP</div>
      <input type="number" id="targetIP" placeholder="Enter target IP">
    </div>
    <div class="control">
      <div class="control-label">Intensity (1-10)</div>
      <input type="number" id="intensity" min="1" max="10" value="5">
    </div>
    <div class="control">
      <div class="control-label">Duration (seconds)</div>
      <input type="number" id="duration" min="1" max="60" value="10">
    </div>
  </div>
  <div id="log"></div>
  <button onclick="startSimulation()">Start Simulation</button>
  <button id="stopButton" onclick="stopSimulation()" disabled>Stop Simulation</button>
</div>

<script>
let simulationInterval;

function updateLog(message) {
  const log = document.getElementById('log');
  log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${message}</div>`;
  log.scrollTop = log.scrollHeight;
}

function startSimulation() {
  const attackType = document.getElementById('attackType').value;
  const targetIP = document.getElementById('targetIP').value;
  const intensity = document.getElementById('intensity').value;
  const duration = document.getElementById('duration').value;

  if (!targetIP) {
    updateLog("Error: Please enter a target IP address.");
    return;
  }

  updateLog(`Starting ${attackType} simulation on ${targetIP} with intensity ${intensity} for ${duration} seconds.`);
  document.getElementById('stopButton').disabled = false;

  let secondsPassed = 0;
  simulationInterval = setInterval(() => {
    secondsPassed++;
    
    switch(attackType) {
      case 'ddos':
        updateLog(`Sending ${intensity * 1000} requests per second from multiple sources...`);
        break;
      case 'dos':
        updateLog(`Flooding target with ${intensity * 500} SYN packets...`);
        break;
      case 'portScan':
        updateLog(`Scanning ports ${Math.floor(Math.random() * 65535)} to ${Math.floor(Math.random() * 65535)}...`);
        break;
      case 'sqlInjection':
        updateLog(`Attempting SQL injection on vulnerable endpoints...`);
        break;
    }

    if (secondsPassed >= duration) {
      stopSimulation();
    }
  }, 1000);
}

function stopSimulation() {
  clearInterval(simulationInterval);
  updateLog("Simulation stopped.");
  document.getElementById('stopButton').disabled = true;
}

// Initial log message
updateLog("Network Security Simulator initialized. Ready for operation.");

</script>

</body>
</html>
